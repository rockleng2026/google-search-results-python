version: '3.8'

services:
  web-search-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-search-api
    ports:
      - "25001:25001"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_CSE_ID=${GOOGLE_CSE_ID:-}
      - API_TOKEN=${API_TOKEN:-}
      - FLASK_ENV=${FLASK_ENV:-production}
      - SERVER_PORT=25001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:25001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
